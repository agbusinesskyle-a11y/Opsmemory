# OpsMemory — Chunk 1 deploy.
#
# One service: opsmemory-api. Binds host loopback only (127.0.0.1:8010).
# Joins the existing spark_internal network so it can reach the existing
# Postgres service. Postgres is NOT defined here — it lives in the
# existing infrastructure compose.
#
# Adjust SPARK_NETWORK_NAME in .env if the existing network is named
# differently on your Spark instance.

services:
  opsmemory-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: opsmemory-api
    env_file:
      - .env
    ports:
      # Host loopback only — cloudflared connects locally, no public port.
      - "127.0.0.1:8010:8000"
    volumes:
      # Backup/restore status files written by host scripts, read read-only
      # by /readyz inside the container. Path inside container matches
      # host path so BACKUP_STATUS_FILE / RESTORE_STATUS_FILE env vars
      # work in both contexts without translation.
      - /var/lib/opsmemory/backup:/var/lib/opsmemory/backup:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - spark_internal

networks:
  spark_internal:
    external: true
    name: ${SPARK_NETWORK_NAME:-spark_internal}
