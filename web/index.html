<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OpsMemory">
<title>OpsMemory</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
  :root {
    color-scheme: light dark;
    --bg: #fafafa;
    --fg: #1a1a1a;
    --muted: rgba(0, 0, 0, 0.55);
    --tile: rgba(0, 0, 0, 0.04);
    --border: rgba(0, 0, 0, 0.12);
    --pill-bg: rgba(0, 0, 0, 0.08);
    --error-bg: rgba(220, 70, 70, 0.10);
    --error-border: rgba(220, 70, 70, 0.30);
    --error-fg: #b00020;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --fg: #f0f0f0;
      --muted: rgba(255, 255, 255, 0.55);
      --tile: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.12);
      --pill-bg: rgba(255, 255, 255, 0.10);
      --error-bg: rgba(255, 100, 100, 0.10);
      --error-border: rgba(255, 100, 100, 0.30);
      --error-fg: #ff8080;
    }
  }
  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--fg);
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  h2 {
    font-size: 15px;
    font-weight: 600;
    margin: 24px 0 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  main {
    padding: 20px;
    max-width: 720px;
    margin: 0 auto;
  }
  .principal {
    background: var(--tile);
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 16px;
  }
  .role-pill {
    display: inline-block;
    background: var(--pill-bg);
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
    margin-left: 8px;
    text-transform: lowercase;
  }
  .email {
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
  }
  ul.businesses {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  ul.businesses li {
    padding: 12px 16px;
    background: var(--tile);
    border-radius: 8px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .error {
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    color: var(--error-fg);
    padding: 14px 16px;
    border-radius: 10px;
    line-height: 1.4;
  }
  .footer-note {
    margin-top: 32px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>
<body>
<header>
  <h1>OpsMemory</h1>
  <span id="status"></span>
</header>
<main>
  <div id="root">Loading…</div>
</main>
<script src="/app.js" defer></script>
</body>
</html>
